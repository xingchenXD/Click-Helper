<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Click Helper 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>预约点击设置</h1>

        <label>
          日期
          <input id="date" type="date">
        </label>

        <label>
          场地
          <select id="court">
            <option value="1号场">1号场</option>
            <option value="2号场">2号场</option>
            <option value="3号场">3号场</option>
            <option value="4号场">4号场</option>
            <option value="5号场">5号场</option>
            <option value="6号场">6号场</option>
            <option value="7号场">7号场</option>
            <option value="8号场">8号场</option>
          </select>
        </label>

        <label>
          时间
          <select id="time">
            <option value="08:00-09:00">08:00-09:00</option>
            <option value="09:00-10:00">09:00-10:00</option>
            <option value="10:00-11:00">10:00-11:00</option>
            <option value="11:00-12:00">11:00-12:00</option>
            <option value="12:00-13:00">12:00-13:00</option>
            <option value="13:00-14:00">13:00-14:00</option>
            <option value="14:10-15:10">14:10-15:10</option>
            <option value="15:10-16:10">15:10-16:10</option>
            <option value="16:10-17:10">16:10-17:10</option>
            <option value="17:10-18:10">17:10-18:10</option>
            <option value="18:10-19:10">18:10-19:10</option>
            <option value="19:10-20:10">19:10-20:10</option>
            <option value="20:10-21:10">20:10-21:10</option>
            <option value="21:10-22:10">21:10-22:10</option>
          </select>
        </label>

        <button id="save" type="button">保存设置</button>
        <p id="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
