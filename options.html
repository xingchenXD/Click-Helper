<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Click Helper 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>预约点击设置</h1>

        <label>
          日期
          <input id="date" type="date">
        </label>

        <fieldset>
          <legend>第 1 个时段</legend>

          <label>
            场地
            <select id="court-1" data-court></select>
          </label>

          <label>
            时间
            <select id="time-1" data-time></select>
          </label>
        </fieldset>

        <fieldset>
          <legend>第 2 个时段</legend>

          <label>
            场地
            <select id="court-2" data-court></select>
          </label>

          <label>
            时间
            <select id="time-2" data-time></select>
          </label>
        </fieldset>

        <button id="save" type="button">保存设置</button>
        <p id="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
